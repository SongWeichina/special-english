<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>土木工程专业英语 · 第十一课 单词卡（公路工程）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f6 0%, #e0e8f0 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .app-wrapper {
            max-width: 1300px;
            width: 100%;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e4a6b, #2c6b8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .title-section .sub {
            font-size: 1rem;
            color: #2e5570;
            margin-top: 0.3rem;
            border-left: 4px solid #4f9bc2;
            padding-left: 1rem;
            background: rgba(255,255,255,0.6);
            border-radius: 0 8px 8px 0;
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            background: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            box-shadow: 0 8px 18px rgba(0,20,40,0.08);
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            background-color: #e3ecf5;
            color: #1c415e;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            white-space: nowrap;
        }

        .btn:hover {
            background-color: #cbddec;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,40,70,0.1);
        }

        .btn.primary {
            background-color: #1c4b6e;
            color: white;
        }

        .btn.primary:hover {
            background-color: #2b638b;
        }

        .btn.secondary {
            background-color: #dce5f0;
            color: #1c415e;
        }

        .status-badge {
            color: #2a5777;
            font-size: 0.9rem;
            padding: 0.2rem 1rem;
            background: #d8e7f5;
            border-radius: 30px;
            white-space: nowrap;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .word-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 15px 30px -12px rgba(0, 30, 50, 0.2),
                        0 0 0 1px rgba(255,255,255,0.7) inset;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .word-card:hover {
            transform: scale(1.02);
            background: white;
            box-shadow: 0 25px 35px -14px #1e3c5c33;
        }

        .word-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #7da5c9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
        }

        .word-english {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0a263b;
            line-height: 1.3;
            word-break: break-word;
            margin-bottom: 0.75rem;
            border-bottom: 2px dashed #b8d1e9;
            padding-bottom: 0.6rem;
        }

        /* 中文释义区域 - 可点击切换 */
        .meaning {
            font-size: 1rem;
            color: #103c5c;
            background: #e6f0fa;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            line-height: 1.5;
            word-break: break-word;
            transition: filter 0.2s, background 0.2s, box-shadow 0.1s;
            cursor: pointer;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
            user-select: none;
        }

        .meaning:hover {
            background: #d3e4f5;
            box-shadow: 0 2px 8px rgba(30, 80, 120, 0.15);
        }

        /* 隐藏状态：模糊 + 浅灰背景 */
        .meaning-hidden {
            filter: blur(5px);
            background: #c2d4e6;
            color: transparent;
            transition: filter 0.2s, background 0.2s;
            cursor: pointer;
        }

        .meaning-hidden::selection {
            background: transparent;
        }

        .footer-tip {
            margin-top: 2.5rem;
            text-align: center;
            color: #2b5f82;
            font-size: 0.95rem;
            font-style: italic;
            background: rgba(255,255,255,0.7);
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            border: 1px solid #ffffff;
        }

        .footer-note {
            margin-top: 2rem;
            color: #6685a2;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            body { padding: 1.5rem 1rem; }
            .title-section h1 { font-size: 1.8rem; }
            .controls { justify-content: center; }
            .btn { padding: 0.4rem 1rem; font-size: 0.9rem; }
            .word-english { font-size: 1.3rem; }
        }

        .word-card {
            animation: gentleFade 0.4s ease backwards;
        }
        @keyframes gentleFade {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header">
        <div class="title-section">
            <h1>🛣️ Lesson 11 · Highway Engineering</h1>
            <div class="sub">第十一课 公路工程 · 课本词汇表 (共24词)</div>
        </div>
        <div class="controls">
            <span class="status-badge" id="wordCount">24 词</span>
            <button class="btn secondary" id="hideAllBtn">🙈 隐藏全部中文</button>
            <button class="btn primary" id="showAllBtn">🔍 显示全部中文</button>
        </div>
    </div>

    <!-- 单词网格将动态渲染至此 -->
    <div id="wordGrid" class="word-grid"></div>

    <div class="footer-tip">
        💡 单击任意中文区域，可单独隐藏或显示该词释义
    </div>
    <div class="footer-note">
        ※ 源自《土木工程专业英语》第3版 (段兵廷 主编) · 第十一课词汇
    </div>
</div>

<script>
(function() {
    // ----- 第十一课 新单词列表 (严格按照课本词汇表) -----
    const words = [
        { english: "abutting", chinese: "毗连的, 邻接的, 邻近的" },
        { english: "speculative", chinese: "投机的, 投机买卖的, 推测的" },
        { english: "traverse", chinese: "横过, 穿过, 经过, 在……来回移动" },
        { english: "benefit", chinese: "利益, 好处, 受益, 有益于" },
        { english: "recreational", chinese: "娱乐性的, 供消遣的, 休养的" },
        { english: "logically", chinese: "逻辑上, 符合逻辑的" },
        { english: "gradation", chinese: "分级, 等级, 级配, 层次" },
        { english: "expressway", chinese: "高速公路, 快车道" },
        { english: "compact", chinese: "压实, 搞实, 密实, 致密" },
        { english: "accommodate", chinese: "供应, 提供, 容纳, 适应" },
        { english: "frequency", chinese: "频率, 周率, 发生次数" },
        { english: "caliche", chinese: "钙质壳, 生硝, 钠硝石" },
        { english: "oyster", chinese: "砾, 蛭, 牡蛎" },
        { english: "bituminous", chinese: "含沥青的, 沥青质的" },
        { english: "catchbasin", chinese: "汇水沟, 截水沟, 雨水井" },
        { english: "adverse", chinese: "相反的, 不利的, 敌对的, 逆的" },
        { english: "precipitation", chinese: "沉淀, 降水, 降水量, 地形性降雨" },
        { english: "photogrammetric", chinese: "摄影制图的, 摄影绘图的" },
        { english: "outlet", chinese: "出口, 出路, 排水口" },
        { english: "barrier", chinese: "栅栏, 屏障, 阻挡层, 挡板" },
        { english: "pneumatic-tired roller", chinese: "汽胎压路机, 汽胎碾" },
        { english: "public utilities", chinese: "公用事业, 公共设施" },
        { english: "calcium chloride", chinese: "氯化钙" },
        { english: "guard rail", chinese: "护栏, 护轨" }
    ];

    const grid = document.getElementById('wordGrid');
    const wordCountSpan = document.getElementById('wordCount');
    wordCountSpan.innerText = `${words.length} 词`;

    // 渲染所有卡片
    function renderCards() {
        grid.innerHTML = '';
        words.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.style.animationDelay = `${index * 0.02}s`;

            const numberDiv = document.createElement('div');
            numberDiv.className = 'word-number';
            numberDiv.textContent = `#${(index + 1).toString().padStart(2, '0')}`;

            const englishDiv = document.createElement('div');
            englishDiv.className = 'word-english';
            englishDiv.textContent = item.english;

            const meaningDiv = document.createElement('div');
            meaningDiv.className = 'meaning';  // 初始可见
            meaningDiv.textContent = item.chinese;

            // 点击单个中文切换隐藏/显示
            meaningDiv.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('meaning-hidden');
            });

            card.appendChild(numberDiv);
            card.appendChild(englishDiv);
            card.appendChild(meaningDiv);
            grid.appendChild(card);
        });
    }

    // 显示全部中文（移除所有隐藏类）
    function showAllMeanings() {
        const allMeanings = document.querySelectorAll('.meaning');
        allMeanings.forEach(meaning => {
            meaning.classList.remove('meaning-hidden');
        });
    }

    // 隐藏全部中文（添加隐藏类）
    function hideAllMeanings() {
        const allMeanings = document.querySelectorAll('.meaning');
        allMeanings.forEach(meaning => {
            meaning.classList.add('meaning-hidden');
        });
    }

    // 绑定按钮
    document.getElementById('showAllBtn').addEventListener('click', showAllMeanings);
    document.getElementById('hideAllBtn').addEventListener('click', hideAllMeanings);

    // 初始化渲染
    renderCards();
})();
</script>
</body>
</html>
